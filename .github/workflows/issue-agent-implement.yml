name: mAOF implementation agent

on:
  issues:
    types: [labeled]

jobs:
  run-implementation-agent:
    if: github.event.label.name == 'agent:implement'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub Copilot CLI
        run: |
          npm install -g @github/copilot-cli

      - name: Authenticate Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | gh auth login --with-token

      - name: Run Implementation Agent
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh copilot run \
            --agent "implementation" \
            --issue $ISSUE_NUMBER \
            --prompt-file ".github/prompts/issue-implementation-agent.txt"

      - name: Mark Issue as done
        if: success()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit $ISSUE_NUMBER --add-label "agent:done" --remove-label "agent:implement"
