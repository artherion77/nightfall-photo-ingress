; staging/container/photo-ingress.conf
; Staging configuration for the "staging-photo-ingress" LXC container.
; All paths are container-internal. No real secrets — STAGING_CLIENT_ID is a
; placeholder that must be replaced before performing live Azure auth.

[core]
config_version = 1
poll_interval_minutes = 60
process_accounts_in_config_order = true
staging_path = /var/lib/ingress/staging
accepted_path = /var/lib/ingress/accepted
trash_path = /var/lib/ingress/trash
registry_path = /var/lib/ingress/registry.db
staging_on_same_pool = true
storage_template = {yyyy}/{mm}/{original}
verify_sha256_on_first_download = true
max_downloads_per_poll = 10
max_poll_runtime_seconds = 120
tmp_ttl_minutes = 30
failed_ttl_hours = 4
orphan_ttl_days = 2
live_photo_capture_tolerance_seconds = 3
live_photo_stem_mode = exact_stem
live_photo_component_order = photo_first
live_photo_conflict_policy = nearest_capture_time
sync_hash_import_enabled = false
sync_hash_import_path = /var/lib/ingress/hashes
sync_hash_import_glob = .hashes.sha1

[account.staging]
enabled = true
display_name = Staging Test Account
provider = onedrive
authority = https://login.microsoftonline.com/consumers
client_id = STAGING_CLIENT_ID_PLACEHOLDER
onedrive_root = /Bilder/Eigene Aufnahmen
token_cache = /var/lib/ingress/tokens/staging.json
delta_cursor = /var/lib/ingress/cursors/staging.cursor

[logging]
log_level = INFO
console_format = json
