[Unit]
Documentation=file:///opt/ingress/README.md
After=local-fs.target
ConditionPathExists=/etc/nightfall/photo-ingress.conf

[Service]
ExecStart=
ExecStart=/opt/ingress/bin/nightfall-photo-ingress --log-mode json process-trash --path /etc/nightfall/photo-ingress.conf
WorkingDirectory=/var/lib/ingress
NoNewPrivileges=yes
PrivateTmp=yes
ProtectSystem=full
TemporaryFileSystem=/tmp:rw,mode=1777
TemporaryFileSystem=/var/cache/nightfall-photo-ingress:rw,mode=0777
RuntimeDirectory=nightfall-status.d
RuntimeDirectoryMode=0755
ReadWritePaths=/var/lib/ingress /var/log/nightfall /run/nightfall-status.d
MemoryMax=256M
