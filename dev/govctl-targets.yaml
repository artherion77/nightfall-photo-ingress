version: 1
defaults:
  lock: false
  timeout_seconds: 300

targets:
  devcontainer.prepare:
    description: "Prepare dev container and cached bootstrap state"
    command: |
      ./dev/bin/devctl setup
      ./dev/bin/devctl assert-cached-ready
      ./dev/bin/devctl status
    requires: []
    preflight: []
    lock: false

  devcontainer.check:
    description: "Read-only dev container drift report"
    command: "./dev/bin/devctl check"
    requires: []
    preflight:
      - container-running:dev-photo-ingress
    lock: false

  devcontainer.update:
    description: "Refresh dev container stacks"
    command: "./dev/bin/devctl update"
    requires: [dev.ensure-running]
    preflight:
      - container-running:dev-photo-ingress
    lock: false

  devcontainer.reset:
    description: "Reset dev container to cached-ready baseline"
    command: |
      ./dev/bin/devctl reset
      ./dev/bin/devctl assert-cached-ready
      ./dev/bin/devctl status
    requires: [dev.ensure-running]
    preflight:
      - container-running:dev-photo-ingress
      - cache-mounts-active
    lock: false

  dev.ensure-running:
    description: "Ensure dev container exists and is running"
    command: |
      lxc info dev-photo-ingress >/dev/null 2>&1 || ./dev/bin/devctl setup
      lxc start dev-photo-ingress 2>/dev/null || true
    preflight: []
    lock: false

  dev.stack-ready.webui:
    description: "Sync webui sources and fix drift if needed"
    command: "./dev/bin/devctl ensure-stack-ready webui"
    requires: [dev.ensure-running]
    preflight:
      - container-running:dev-photo-ingress
      - cache-mounts-active
    lock: true

  dev.stack-ready.dashboard:
    description: "Sync dashboard sources and fix drift if needed"
    command: "./dev/bin/devctl ensure-stack-ready dashboard"
    requires: [dev.ensure-running]
    preflight:
      - container-running:dev-photo-ingress
      - cache-mounts-active
    lock: true

  backend.build.wheel:
    description: "Build Python wheel into dist/"
    command: |
      build_python="python3"
      if [[ -x ./.venv/bin/python ]]; then
        build_python="./.venv/bin/python"
      fi
      "$build_python" -m build --wheel --outdir dist/
    requires: []
    preflight: []
    lock: false

  backend.deploy.dev:
    description: "Run backend API in the dev container"
    command: "./dev/bin/devctl run-api"
    requires: [dev.ensure-running]
    preflight:
      - container-running:dev-photo-ingress
    lock: false

  backend.e2e:
    description: "Run backend-oriented staging smoke checks"
    command: "./dev/bin/stagingctl smoke"
    requires: [staging.ensure-running, staging.install]
    preflight:
      - container-running:staging-photo-ingress
    lock: false

  backend.test.unit:
    description: "Run backend unit tests"
    command: |
      test_python="python3"
      if [[ -x ./.venv/bin/python ]]; then
        test_python="./.venv/bin/python"
      fi
      "$test_python" -m pytest tests/unit -q
    requires: []
    preflight: []
    lock: false
    timeout_seconds: 120

  backend.test.integration:
    description: "Run backend integration tests"
    command: |
      test_python="python3"
      if [[ -x ./.venv/bin/python ]]; then
        test_python="./.venv/bin/python"
      fi
      "$test_python" -m pytest tests/integration -q
    requires: []
    preflight: []
    lock: false
    timeout_seconds: 180

  web.typecheck:
    description: "SvelteKit typecheck (webui)"
    command: "./dev/bin/devctl test-web-typecheck"
    requires: [dev.stack-ready.webui]
    preflight:
      - container-running:dev-photo-ingress
      - node-version-match
    lock: true

  web.typecheck.dashboard:
    description: "SvelteKit typecheck (metrics dashboard)"
    command: "./dev/bin/devctl test-metrics-dashboard-typecheck"
    requires: [dev.stack-ready.dashboard]
    preflight:
      - container-running:dev-photo-ingress
      - node-version-match
    lock: true

  web.test.unit:
    description: "Vitest unit tests for webui"
    command: "./dev/bin/devctl test-web-unit"
    requires: [dev.stack-ready.webui]
    preflight:
      - container-running:dev-photo-ingress
      - stack-drift-free:webui
    lock: true
    timeout_seconds: 120

  web.test.e2e:
    description: "E2E test suite (runs against staging-photo-ingress)"
    command: "./.venv/bin/python -m pytest tests/e2e -v --tb=short"
    requires: [staging.ensure-running, staging.install]
    preflight:
      - container-running:staging-photo-ingress
    lock: false
    timeout_seconds: 300

  web.test.integration:
    description: "Web integration test suite"
    command: "./.venv/bin/python -m pytest tests/e2e -v --tb=short"
    requires: [staging.ensure-running, staging.install]
    preflight:
      - container-running:staging-photo-ingress
    lock: false
    timeout_seconds: 300

  web.build:
    description: "Production SvelteKit build (webui)"
    command: |
      rm -rf webui/build
      mkdir -p webui/build
      lxc exec dev-photo-ingress -- bash -lc \
        'set -euo pipefail; cd /opt/nightfall-webui && npm run build >&2 && tar -C build -czf - .' \
        | tar -xzf - -C webui/build
    requires: [dev.stack-ready.webui]
    preflight:
      - container-running:dev-photo-ingress
      - stack-drift-free:webui
      - token-source-consistent
      - config-template-complete:staging/container/photo-ingress.conf
    lock: true

  web.deploy.dev:
    description: "Run web UI in the dev container"
    command: "./dev/bin/devctl run-webui"
    requires: [dev.ensure-running]
    preflight:
      - container-running:dev-photo-ingress
    lock: false

  metrics.build.dashboard:
    description: "Build metrics dashboard statics + fingerprint"
    command: "./dev/bin/build-metrics-dashboard"
    # build-metrics-dashboard already runs `devctl ensure-stack-ready dashboard`
    # internally; keeping this target dependency empty avoids duplicate drift
    # checks while preserving the same readiness guardrail.
    requires: []
    preflight:
      - container-running:dev-photo-ingress
    lock: true

  metrics.collect.backend:
    description: "Collect backend metrics (Module 2)"
    command: "./dev/bin/metricsctl collect-backend"
    requires: []
    preflight: []
    lock: true

  metrics.status:
    description: "Report metrics runtime status"
    command: "./dev/bin/metricsctl status"
    requires: []
    preflight: []
    lock: true

  metrics.run-now:
    description: "Trigger metrics pipeline immediately"
    command: "./dev/bin/metricsctl run-now"
    requires: []
    preflight: []
    lock: true

  metrics.collect.frontend:
    description: "Collect frontend metrics (Module 3)"
    command: "./dev/bin/metricsctl collect-frontend"
    requires: []
    preflight: []
    lock: true

  metrics.aggregate:
    description: "Aggregate collected metrics (Module 4)"
    command: "./dev/bin/metricsctl aggregate"
    requires: [metrics.collect.backend, metrics.collect.frontend]
    preflight: []
    lock: true

  metrics.generate.dashboard:
    description: "Generate dashboard from aggregated data (Module 5)"
    command: "./dev/bin/metricsctl generate-dashboard"
    requires: [metrics.aggregate, metrics.build.dashboard]
    preflight: []
    lock: true

  metrics.publish:
    description: "Publish metrics surface (Module 7)"
    command: "./dev/bin/metricsctl publish"
    requires: [metrics.generate.dashboard]
    preflight: []
    lock: true

  metrics.install:
    description: "Install metrics automation"
    command: "./dev/bin/metricsctl install"
    requires: []
    preflight: []
    lock: true

  metrics.stop:
    description: "Stop metrics automation"
    command: "./dev/bin/metricsctl stop"
    requires: []
    preflight: []
    lock: true

  staging.create:
    description: "Create staging container baseline"
    command: "./dev/bin/stagingctl create"
    requires: []
    preflight: []
    lock: false

  staging.ensure-running:
    description: "Ensure staging container exists and is running"
    command: |
      lxc info staging-photo-ingress >/dev/null 2>&1 || ./dev/bin/stagingctl create
      lxc start staging-photo-ingress 2>/dev/null || true
    requires: []
    preflight: []
    lock: false

  staging.install:
    description: "Build wheel and install into staging container"
    command: "./dev/bin/stagingctl install \"$(ls -t dist/*.whl | head -1)\""
    requires: [staging.ensure-running, backend.build.wheel, web.build]
    preflight:
      - container-running:staging-photo-ingress
      - bridge-network:br-staging
      - artifact-hash-recorded:web.build
      - artifact-hash-recorded:backend.build.wheel
      - artifact-hash-verified:webui/build/
      - artifact-hash-verified:dist/*.whl
      - token-source-consistent
    lock: false

  staging.e2e.module1:
    description: "Run E2E Suite Module 1"
    command: "./.venv/bin/python -m pytest tests/e2e -v --tb=short"
    requires: [staging.ensure-running, staging.install]
    preflight:
      - container-running:staging-photo-ingress
    lock: false
    timeout_seconds: 120

  staging.smoke:
    description: "Run headless smoke assertions in staging"
    command: "./dev/bin/stagingctl smoke"
    requires: [staging.ensure-running, staging.install]
    preflight:
      - container-running:staging-photo-ingress
    lock: false

  staging.smoke-live:
    description: "Authenticated live poll + secret scan"
    command: "./dev/bin/stagingctl smoke-live"
    requires: [staging.ensure-running, staging.install]
    preflight:
      - container-running:staging-photo-ingress
    lock: false

  dev.check:
    description: "Read-only drift report"
    command: "./dev/bin/devctl check"
    requires: []
    preflight:
      - container-running:dev-photo-ingress
    lock: false

groups:
  test.backend:
    targets: [backend.test.unit, backend.test.integration]

  test.web:
    targets: [web.typecheck, web.typecheck.dashboard, web.test.unit]

  test.all:
    targets: [test.backend, test.web]

  build.all:
    targets: [backend.build.wheel, web.build, metrics.build.dashboard]

  staging.full:
    targets: [staging.ensure-running, staging.install, staging.smoke, staging.e2e.module1]

  metrics.full:
    targets:
      - metrics.collect.backend
      - metrics.collect.frontend
      - metrics.aggregate
      - metrics.generate.dashboard
      - metrics.publish

  all:
    targets: [test.all, build.all, staging.full, metrics.full]